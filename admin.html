<!doctype html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Admin Dashboard</title>
  </head>
  <body>
    <section id="admin-panel-header">
      <section id="side-panel">
        <div id="panel-heading">
          <h1>Admin Panel</h1>
          <p>Management Console</p>
        </div>
        <div id="panel-buttons">
          <button class="button-active">
            <i class="fas fa-shopping-bag"></i>Products
          </button>
          <button><i class="fa fa-truck"></i>Orders</button>
          <button><i class="fas fa-cog"></i>Settings</button>
        </div>
      </section>
      <section id="admin-panel-right">
        <header id="header">
          <img src="images/logo.png" />
          <div id="nav-icons">
            <i class="fa fa-search"></i>
            <i class="fa fa-shopping-cart"></i>
            <i class="far fa-bell"></i>
          </div>
        </header>
        <section id="add-product-card">
          <div id="card-header">
            <h2>Add New Product</h2>
            <p>List a new luxury item in the storefront.</p>
          </div>
          <form id="product-form">
            <div id="product-name-price">
              <div class="product-input">
                <label for="product-name">Product Name</label>
                <input
                  type="text"
                  id="product-name"
                  placeholder="e.g. travel bag for men"
                />
              </div>
              <div class="product-input">
                <label for="product-price">Price (USD)</label>
                <input type="number" step="0.01" id="product-price" placeholder="0.00" />
              </div>
            </div>
            <div id="product-image-category">
              <div class="product-input">
                <label for="product-img">Image Url</label>
                <input
                  type="url"
                  id="product-img"
                  placeholder="https://images.unsplash.com/..."
                />
              </div>
              <div class="product-input">
                <label for="product-category">Category</label>
                <input type="text" id="product-category" placeholder="e.g. men's clothing" />
              </div>
            </div>
            <div id="product-description">
              <div class="product-input">
                <label for="product-desc">Description</label>
                <textarea
                  id="product-desc"
                  rows="5"
                  placeholder="Describe the item's material, craftsmanship, and aesthetic appeal..."
                ></textarea>
              </div>
            </div>
            <div id="save-product-btn">
              <div class="product-input">
                <button id="product-save-button">
                  <i class="fa fa-save"></i>Save Product
                </button>
              </div>
            </div>
          </form>
        </section>
        <section id="live-inventory">
          <div id="inventory-heading">
            <div>
              <h2>Live Inventory</h2>
              <p>Monitoring 124 active products.</p>
            </div>
            <div id="inventory-filter-download">
              <button><i class="fa fa-filter"></i></button>
              <button><i class="fa fa-download"></i></button>
            </div>
          </div>
          <div class="table-responsive">
            <table id="inventory-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Price</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="inventory-rows"></tbody>
            </table>
          </div>
        </section>
        <section id="user-messages">
          <div id="display-messages">
            <div id="message-heading">
              <h2>Messages</h2>
            </div>
            <div id="message-content">
            </div>
          </div>
        </section>
      </section>
    </section>
    <script src="admin.js"></script>
  </body>
</html>
